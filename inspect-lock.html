<!doctype html>
<html lang="hu">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <title>Layero muhely zarva</title>
    <style>
      html,
      body {
        margin: 0;
        min-width: 320px;
        min-height: 100%;
        overflow: hidden;
        background: #000;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }

      .inspect-lock-screen {
        position: fixed;
        inset: 0;
        min-height: 100vh;
        background: #000;
        overflow: hidden;
      }

      .inspect-lock-image {
        display: block;
        width: 100%;
        height: 100vh;
        object-fit: cover;
        object-position: center;
        pointer-events: none;
        -webkit-user-drag: none;
        user-drag: none;
      }
    </style>
  </head>
  <body>
    <main class="inspect-lock-screen" role="main" aria-label="Layero inspect zarolokepernyo">
      <img class="inspect-lock-image" src="assets/inspect_background.webp" alt="" draggable="false">
    </main>
    <script>
      (function () {
        function block(event) {
          event.preventDefault();
          event.stopPropagation();
        }

        ["contextmenu", "copy", "cut", "selectstart", "dragstart"].forEach(function (name) {
          document.addEventListener(name, block, { capture: true });
        });

        document.addEventListener("keydown", function (event) {
          if (event.key === "F12" || event.ctrlKey || event.metaKey) {
            block(event);
          }
        }, { capture: true });
      })();
    </script>
  </body>
</html>
